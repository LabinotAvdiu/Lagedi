name: Build & Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Laravel Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend to VPS
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/app/firebase-credentials.json' \
            --exclude='storage/app/public/*' \
            --exclude='node_modules' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_SSH_PORT }} -o StrictHostKeyChecking=yes" \
            backend/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/termini-im-api/

      - name: Post-deploy commands
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "set -e && \
             cd /var/www/termini-im-api && \
             { find storage bootstrap/cache -type d -exec chmod 2775 {} + 2>/dev/null || true; } && \
             { find storage bootstrap/cache -type f -exec chmod 664 {} + 2>/dev/null || true; } && \
             composer install --no-dev --optimize-autoloader --no-interaction && \
             php artisan migrate --force && \
             php artisan optimize:clear && \
             php artisan config:cache && \
             php artisan route:cache && \
             php artisan view:cache && \
             php artisan queue:restart"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
