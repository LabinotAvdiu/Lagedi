server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Static storage files (gallery, etc.) — permissive CORS so Flutter Web
    # (CanvasKit renderer) can decode them into canvas without tainting.
    # Also block PHP execution explicitly and prevent content-type sniffing.
    location ^~ /storage/ {
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header X-Content-Type-Options        "nosniff" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*"  always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age       86400 always;
            return 204;
        }

        # Defence-in-depth: never execute PHP from within /storage
        location ~ \.php$ {
            return 403;
        }

        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
